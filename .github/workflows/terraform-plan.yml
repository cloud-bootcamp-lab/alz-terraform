name: Terraform - PR Plan

concurrency:
  group: terraform-state
  cancel-in-progress: false

on:
  pull_request:
    branches: ["main"]

jobs:
  plan:
    runs-on: ubuntu-latest

    env:
      # Azure auth for Terraform (Repository Secrets)
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      # Required Terraform variables (prevents prompt/hang in CI)
      TF_VAR_location: eastus
      TF_VAR_resource_group_name: rg-platform-management

      # Optional: opt into Node.js 24 now to avoid future runner warnings
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Debug ARM variables (safe)
        shell: bash
        run: |
          echo "ARM_TENANT_ID length=${#ARM_TENANT_ID}"
          echo "ARM_SUBSCRIPTION_ID length=${#ARM_SUBSCRIPTION_ID}"
          echo "ARM_CLIENT_ID length=${#ARM_CLIENT_ID}"
          echo "ARM_CLIENT_SECRET length=${#ARM_CLIENT_SECRET}"
          echo "$ARM_TENANT_ID" | grep -Eq '^[0-9a-fA-F-]{36}$' && echo "TENANT_ID looks like GUID" || (echo "TENANT_ID invalid" && exit 1)
          echo "$ARM_CLIENT_ID" | grep -Eq '^[0-9a-fA-F-]{36}$' && echo "CLIENT_ID looks like GUID" || (echo "CLIENT_ID invalid" && exit 1)

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (remote backend)
        run: terraform init -reconfigure -backend-config backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -lock-timeout=10m -input=false